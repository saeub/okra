name: okra
description: An app for text readability and comprehension experiments.

publish_to: 'none'

version: 0.1.0-alpha

environment:
  sdk: ">=2.12.0 <3.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  auto_size_text: ^3.0.0-nullsafety.0
  qr_mobile_vision: ^3.0.0
  flutter_markdown: ^0.6.0
  http: ^0.13.0
  intl: ^0.17.0
  just_audio: ^0.7.1
  localstorage: ^4.0.0
  provider: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  # flutter_driver:
  #   sdk: flutter
  mockito: ^5.0.1
  pedantic: ^1.9.2
  test: ^1.15.7
  flutter_launcher_icons: ^0.9.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/balloon.png
    - assets/images/balloon_popped.png

flutter_intl:
  enabled: true

flutter_icons:
  android: launcher_icon
  ios: true
  image_path: assets/images/icon.png
